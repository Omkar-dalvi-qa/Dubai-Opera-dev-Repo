name: Trigger Playwright Tests

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v3
        with:
          repository: Omkar-dalvi-qa/Dubai-Opera-TestCases
          token: ${{ secrets.GH_TOKEN }}

      - name: Push trigger commit
        run: |
          git config user.email "omkar.dalvi@enpointe.io"
          git config user.name "Omkar Dalvi"
          echo "$(date)" > .trigger
          git add .trigger
          git commit -m "trigger: dev push detected"
          git push